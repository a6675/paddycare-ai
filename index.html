<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare AI</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c584a">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #7c584a; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #f4ece1;
        }

        .app-container {
            width: 95%;
            max-width: 1100px;
            text-align: center;
            padding: 20px;
        }

        /* --- LOGO STYLING --- */
        .main-logo {
            width: 150px;
            height: 150px;
            border-radius: 50%; 
            border: 5px solid #e9dcc3;
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* --- MAIN MENU GRID --- */
        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            margin-top: 30px;
        }

        .folder-card {
            background: #e9dcc3;
            padding: 30px;
            border-radius: 5px 40px 5px 5px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 8px 8px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s, background 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 180px;
        }

        .folder-card:hover {
            transform: translateY(-10px);
            background: #f5ead6;
        }

        .folder-card h2 { margin-top: 0; color: #4a3728; }
        .folder-card p { font-size: 0.95rem; line-height: 1.4; }

        /* --- SCAN PAGE --- */
        #scan-page {
            display: none;
            background-color: #fdfaf5;
            color: #4a3728;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .scan-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            align-items: center;
        }

        #media-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border: 4px solid #8d7558;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, #uploaded-image { width: 100%; height: 100%; object-fit: cover; }

        .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-action { background: #8d7558; color: white; }
        .btn-back { background: #4a3728; color: white; margin-bottom: 20px; }

        .result-box {
            background: #eee;
            padding: 20px;
            border-radius: 10px;
            border-left: 8px solid #8d7558;
            text-align: left;
        }

        #ai-status { font-size: 0.8rem; margin-top: 10px; color: #8d7558; font-weight: bold; }
    </style>
</head>

    <div class="app-container">
        
        <div id="main
