<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare AI - Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #7c584a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #fdfaf5; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #video-container { width: 100%; aspect-ratio: 1; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 3px solid #8d7558; position: relative; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        .switch-btn { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px solid white; padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .btn { background: #4a3728; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .result-box { background: #eee; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 8px solid #8d7558; text-align: left; }
        #loading-msg { color: #8d7558; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn" onclick="window.location.href='index.html'">← KEMBALI</button>
        <h2>AI Paddy Scanner</h2>
        <p id="loading-msg">Memuatkan Model AI...</p>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <img id="preview" style="display:none">
            <button id="btn-switch" class="switch-btn" onclick="switchCamera()">🔄</button>
        </div>

        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleFile(event)">
        <button class="btn" onclick="startCamera()">BUKA KAMERA</button>
        <button class="btn" onclick="document.getElementById('file-input').click()">GALERI</button>
        <button class="btn" style="background:#8d7558" id="predict-btn" disabled onclick="predict()">ANALISIS SEKARANG</button>
        
        <div class="result-box">
            <div id="status">Status: Menunggu...</div>
            <div id="prediction"><strong>Hasil:</strong> -</div>
        </div>
    </div>

    <script>
        let model;
        let currentStream;
        let useFrontCamera = false;
        const CLASS_LIST = ['Bacteria Panicle Blight', 'Brown Spot', 'Normal', 'Pseudomonas Fuscovaginae', 'Rice Blast', 'Sheath Blight'];

        async function loadModel() {
            try {
                // Sila pastikan fail model.json ada dalam folder model_tfjs
                model = await tf.loadLayersModel('model_tfjs/model.json');
                document.getElementById('loading-msg').innerText = "Model Sedia!";
                document.getElementById('predict-btn').disabled = false;
            } catch (err) {
                document.getElementById('loading-msg').innerText = "Ralat muat fail .bin!";
            }
        }

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const video = document.getElementById('webcam');
            document.getElementById('preview').style.display = 'none';
            video.style.display = 'block';
            const mode = useFrontCamera ? "user" : "environment";
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                video.srcObject = currentStream;
            } catch (e) { alert("Kamera ralat!"); }
        }

        function switchCamera() { useFrontCamera = !useFrontCamera; startCamera(); }

        function handleFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('webcam').style.display = 'none';
                    const p = document.getElementById('preview');
                    p.style.display = 'block'; p.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function predict() {
            document.getElementById('status').innerText = "Menganalisis...";
            const img = document.getElementById('webcam').style.display !== 'none' ? document.getElementById('webcam') : document.getElementById('preview');
            const tensor = tf.browser.fromPixels(img).resizeNearestNeighbor([224, 224]).toFloat().expandDims();
            const pred = await model.predict(tensor).data();
            const idx = pred.indexOf(Math.max(...pred));
            document.getElementById('status').innerText = "Selesai";
            document.getElementById('prediction').innerHTML = `<strong>Hasil:</strong> ${CLASS_LIST[idx]}`;
        }
        loadModel();
    </script>
</body>
</html>
