<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare AI - Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #7c584a; color: white; text-align: center; padding: 20px; }
        
        /* Bekas utama untuk UI scanner */
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #fdfaf5; 
            color: #333; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        
        /* Frame video kamera */
        #video-container { 
            width: 100%; 
            aspect-ratio: 1; 
            background: #000; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            border: 3px solid #8d7558; 
            position: relative; /* Penting untuk butang switch terapung di dalam */
        }

        video, img { width: 100%; height: 100%; object-fit: cover; }

        /* Gaya butang tukar kamera (Bulat & Terapung) */
        .switch-btn { 
            position: absolute; 
            bottom: 15px; 
            right: 15px; 
            background: rgba(0,0,0,0.7); 
            color: white; 
            border: 2px solid white; 
            padding: 10px; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 100; 
            width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
        }

        /* Butang kawalan utama */
        .btn { 
            background: #4a3728; 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin: 5px 0; 
        }

        /* Kotak paparan hasil analisis */
        .result-box { 
            background: #eee; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 15px; 
            border-left: 8px solid #8d7558; 
            text-align: left; 
        }

        #loading-msg { color: #8d7558; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
