<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare AI - Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #7c584a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #fdfaf5; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        #video-container { 
            width: 100%; aspect-ratio: 1; background: #000; border-radius: 10px; 
            overflow: hidden; margin-bottom: 15px; border: 3px solid #8d7558; position: relative;
        }
        video, img { width: 100%; height: 100%; object-fit: cover; }

        .btn-switch {
            background: #e67e22; color: white; border: 2px solid #d35400;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin: 10px auto 20px auto; display: block; width: 85%;
        }

        .btn { background: #4a3728; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .result-box { background: #eee; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 8px solid #8d7558; text-align: left; }
        #loading-msg { color: #8d7558; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn" onclick="window.location.href='index.html'">← KEMBALI KE MENU</button>
        <h2>AI Paddy Scanner</h2>
        <p id="loading-msg">Memuatkan model AI...</p>

        <div id="video-container">
            <video id="webcam" autoplay playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></video>
            <img id="preview" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        </div>

        <button type="button" class="btn-switch" onclick="switchCamera()">
            🔄 TUKAR KE SELFIE / BELAKANG
        </button>

        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleFile(event)">

        <button class="btn" onclick="startCamera()">1. AKTIFKAN KAMERA</button>
        <button class="btn" onclick="document.getElementById('file-input').click()">2. AMBIL DARI GALERI</button>
        
        <button class="btn" style="background:#2ecc71" id="predict-btn" disabled onclick="predict()">3. MULA ANALISIS AI</button>
        
        <div class="result-box">
            <div id="status">Status: Sedia</div>
            <div id="prediction"><strong>Hasil:</strong> -</div>
        </div>
    </div>

    <script>
        let model; 
        let currentStream; 
        let useFrontCamera = false; 

        const CLASS_LIST = [
            'Bacteria Panicle Blight', 'Brown Spot', 'Oryza Sativa (Normal)', 
            'Pseudomonas Fuscovaginae', 'Rice Blast', 'Sheath Blight'
        ];

        async function loadModel() {
            try {
                model = await tf.loadLayersModel('model_tfjs/model.json');
                document.getElementById('loading-msg').innerText = "Model AI Sedia!";
                document.getElementById('predict-btn').disabled = false;
            } catch (err) {
                document.getElementById('loading-msg').innerText = "Ralat: Gagal muat fail AI!";
            }
        }

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            const video = document.getElementById('webcam');
            const preview = document.getElementById('preview');
            preview.style.display = 'none';
            video.style.display = 'block';

            const mode = useFrontCamera ? "user" : "environment";
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                video.srcObject = currentStream;
                video.play();
            } catch (err) {
                alert("Kamera gagal diakses.");
            }
        }

        function switchCamera() {
            useFrontCamera = !useFrontCamera;
            if (currentStream) startCamera();
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (file) {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('webcam').style.display = 'none';
                    const preview = document.getElementById('preview');
                    preview.style.display = 'block';
                    preview.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function predict() {
            if (!model) return;

            const video = document.getElementById('webcam');
            const preview = document.getElementById('preview');
            const statusTarget = document.getElementById('status');

            statusTarget.innerText = "Status: Menganalisis...";

            // Determine image source
            let imgSource;
            if (video.style.display !== 'none' && video.readyState >= video.HAVE_CURRENT_DATA) {
                // If live video is active and has data, snap a frame
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                preview.src = canvas.toDataURL('image/png');
                imgSource = preview;
                
                // Optional: Stop current stream after snap to save resources
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }
                
                // Show the snapped frame, hide video
                preview.style.display = 'block';
                video.style.display = 'none';
            } else if (preview.style.display !== 'none' && preview.src) {
                // If a gallery image is already showing, use that
                imgSource = preview;
            } else {
                 statusTarget.innerText = "Status: Sedia (Tiada Imej)";
                 return; // No image source available
            }

            // Process with TensorFlow.js
            const tensor = tf.browser.fromPixels(imgSource)
                .resizeNearestNeighbor([224, 224])
                .toFloat()
                .expandDims();

            const predictions = await model.predict(tensor).data();
            
            const maxConfidence = Math.max(...predictions);
            const topIndex = predictions.indexOf(maxConfidence);
            
            const THRESHOLD = 0.6; 

            if (maxConfidence < THRESHOLD) {
                document.getElementById('prediction').innerHTML = `<strong>Hasil:</strong> <span style="color:red;">Padi Tidak Dikenal Pasti</span><br><small>(Sila ambil gambar yang lebih jelas)</small>`;
            } else {
                document.getElementById('prediction').innerHTML = `<strong>Hasil:</strong> ${CLASS_LIST[topIndex]} <br><small>Keyakinan: ${(maxConfidence * 100).toFixed(1)}%</small>`;
            }
            
            statusTarget.innerText = "Status: Selesai";
        }

        loadModel();
    </script>
</body>
</html>
