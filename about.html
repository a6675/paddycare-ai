<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - PaddyCare AI</title>
    <style>
        /* Gaya asas untuk latar belakang */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #3d2b24; /* Warna coklat gelap supaya konsisten dengan index.html */
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .container { 
            max-width: 800px; 
            width: 100%; 
            background: #fdfaf5; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center;
        }

        /* Gaya untuk paparan poster */
        .poster-img { 
            width: 100%; /* Poster akan ikut lebar skrin */
            height: auto; 
            border-radius: 10px; 
            border: 2px solid #8d7558;
        }

        .btn { 
            background: #4a3728; 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn:hover { background: #5d4636; }
    </style>
</head>
<body>

    <a href="index.html" class="btn">← KEMBALI KE MENU</a>

    <div class="container">
        <img src="Poster.jpg" alt="Poster PaddyCare AI" class="poster-img">
        
        <p style="color: #333; margin-top: 15px; font-weight: bold;">
            © 2026 PaddyCare AI - Inovasi Untuk Pesawah
        </p>
    </div>

</body>
</html>
