<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare - Home</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo_paddy.png">
    
    <style>
        /* Reset margin dan padding untuk paparan kemas */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #3d2b24; /* Tema warna tanah/coklat gelap */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Mengelakkan skrol yang tidak perlu */
        }

        /* Bekas utama yang membungkus gambar menu */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        /* Gaya untuk logo yang terapung di atas imej menu */
        .logo-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4); /* Latar belakang separa telus */
            padding: 8px 18px;
            border-radius: 50px;
            backdrop-filter: blur(5px); /* Efek kabur di belakang logo */
        }

        .app-logo { width: 40px; height: 40px; }
        .brand-name { color: #fff; font-weight: bold; letter-spacing: 1px; }

        /* Memastikan imej menu memenuhi ruang wrapper */
        .background-img { width: 100%; height: auto; display: block; }

        /* Kawasan klik (hitbox) lutsinar yang bertindih pada gambar folder */
        .nav-link {
            position: absolute;
            top: 25%; /* Kedudukan dari atas imej */
            height: 60%; /* Ketinggian kawasan klik */
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            border-radius: 15px;
        }

        /* Kedudukan mendatar bagi setiap folder (Scanner, Modul, About) */
        .link-scanner { left: 5%; width: 28%; }
        .link-modul { left: 36%; width: 28%; }
        .link-about { left: 67%; width: 28%; }

        /* Efek visual apabila tetikus (hover) berada di atas folder */
        .nav-link:hover { 
            background-color: rgba(255, 255, 255, 0.1); 
            transform: scale(1.02); /* Sedikit pembesaran untuk maklum balas pengguna */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-container">
            <img src="logo_paddy.png" alt="Logo" class="app-logo">
            <span class="brand-name">PaddyCare AI</span>
        </div>

        <img src="website.png" alt="Menu Utama" class="background-img">

        <a href="scanner.html" class="nav-link link-scanner" title="Buka Scanner AI"></a>
        
        <a href="PaddyCareModul.pdf" target="_blank" class="nav-link link-modul" title="Lihat Modul"></a>
        
        <a href="about.html" class="nav-link link-about" title="Tentang Aplikasi"></a>
    </div>

    <script>
        /**
         * PENDAFTARAN SERVICE WORKER (PWA)
         * Membolehkan aplikasi disimpan dalam telefon dan berfungsi secara offline.
         */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("PaddyCare: Service Worker Aktif"))
                .catch((err) => console.log("PaddyCare: Pendaftaran SW Gagal", err));
        }
    </script>
</body>
</html>
