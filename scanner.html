<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare AI - Scanner Fast Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #7c584a; color: white; text-align: center; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #fdfaf5; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        #video-container { 
            width: 100%; aspect-ratio: 1; background: #000; border-radius: 10px; 
            overflow: hidden; margin-bottom: 15px; border: 3px solid #8d7558; position: relative;
        }
        video, img { width: 100%; height: 100%; object-fit: cover; }

        .btn { background: #4a3728; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-green { background: #2ecc71; margin-top: 10px; }
        .btn:disabled { background: #ccc; }

        /* Kotak Hasil Analisis */
        .result-box { background: #fff; padding: 15px; border-radius: 8px; margin-top: 15px; border: 2px solid #8d7558; text-align: left; color: #333; }
        
        /* Kotak Maklumat Automatik */
        #auto-info { display: none; margin-top: 15px; text-align: left; background: #fff; border-radius: 10px; padding: 15px; border-top: 5px solid #b03a2e; }
        .info-title { color: #b03a2e; font-weight: bold; font-size: 18px; margin-bottom: 5px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .sci-name { font-style: italic; font-size: 13px; color: #666; margin-bottom: 10px; display: block; }
        
        h4 { margin: 15px 0 5px 0; color: #2e7d32; font-size: 15px; text-transform: uppercase; }
        ul { margin: 0; padding-left: 20px; font-size: 14px; }
        li { margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn" onclick="window.location.href='index.html'">← MENU</button>
        <h2 style="margin:10px 0;">AI Scanner</h2>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <img id="preview" style="display:none">
        </div>

        <button class="btn" style="background:#e67e22" onclick="switchCamera()">🔄 TUKAR KAMERA</button>
        <div style="display: flex; gap: 5px;">
            <button class="btn" style="flex:1" onclick="startCamera()">KAMERA</button>
            <button class="btn" style="flex:1" onclick="document.getElementById('file-input').click()">GALERI</button>
        </div>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleFile(event)">
        
        <button class="btn btn-green" id="predict-btn" disabled onclick="predict()">3. MULA ANALISIS AI</button>
        
        <div class="result-box">
            <div id="status">Status: Sedia</div>
            <div id="prediction" style="font-size: 18px;"><strong>Hasil:</strong> -</div>
        </div>

        <div id="auto-info">
            <div id="info-header">
                <span class="info-title" id="dis-name">Nama Penyakit</span>
                <span class="sci-name" id="dis-sci">Scientific Name</span>
            </div>
            
            <h4>Simptom:</h4>
            <div id="dis-symp"></div>

            <h4>Punca:</h4>
            <div id="dis-cause"></div>

            <h4>Penyelesaian:</h4>
            <div id="dis-sol"></div>
        </div>
    </div>

    <script>
        let model; let currentStream; let useFrontCamera = false;

        const CLASS_LIST = [
            'Bacterial Panicle Blight', 'Brown Spot', 'Oryza Sativa (Normal)', 
            'Pseudomonas Fuscovaginae', 'Rice Blast', 'Sheath Blight'
        ];

        // Database Maklumat Penyakit
        const db = {
            'Sheath Blight': {
                name: "HAWAR SELUDANG", sci: "Rhizoctonia solani",
                symp: "<ul><li>Lesi coklat pada seludang</li><li>Pokok kelihatan terbakar</li></ul>",
                cause: "<ul><li>Kulat tanah Rhizoctonia</li><li>Sisa tanaman lama</li></ul>",
                sol: "<ul><li>Jarak tanam sesuai</li><li>Kawal air & guna racun kulat</li></ul>"
            },
            'Rice Blast': {
                name: "KARAH (RICE BLAST)", sci: "Pyricularia oryzae",
                symp: "<ul><li>Tompok bentuk berlian</li><li>Bulir padi menjadi hampa/kosong</li></ul>",
                cause: "<ul><li>Spora bawaan angin & hujan</li></ul>",
                sol: "<ul><li>Guna varieti tahan</li><li>Kawal baja Nitrogen</li></ul>"
            },
            'Bacterial Panicle Blight': {
                name: "HAWAR BULIR BAKTERIA", sci: "Burkholderia glumae",
                symp: "<ul><li>Bulir kosong & hitam</li><li>Tangkai padi tegak mendongak</li></ul>",
                cause: "<ul><li>Bakteria bawaan benih</li></ul>",
                sol: "<ul><li>Guna benih bersih</li><li>Ubah tarikh penanaman</li></ul>"
            },
            'Brown Spot': {
                name: "BINTIK PERANG", sci: "Helminthosporium oryzae",
                symp: "<ul><li>Bintik coklat bulat pada daun</li><li>Daun menjadi kering</li></ul>",
                cause: "<ul><li>Tanah kurang nutrien (Potassium)</li></ul>",
                sol: "<ul><li>Baja seimbang</li><li>Rawatan benih</li></ul>"
            },
            'Pseudomonas Fuscovaginae': {
                name: "SAMBANG", sci: "Pseudomonas fuscovaginae",
                symp: "<ul><li>Seludang coklat lebam</li><li>Bulir tidak terisi penuh</li></ul>",
                cause: "<ul><li>Bakteria melalui air & benih</li></ul>",
                sol: "<ul><li>Sanitasi ladang</li><li>Benih bebas penyakit</li></ul>"
            }
        };

        async function loadModel() {
            try {
                model = await tf.loadLayersModel('model_tfjs/model.json');
                document.getElementById('loading-msg').innerText = "Model Sedia!";
                document.getElementById('predict-btn').disabled = false;
            } catch (e) { document.getElementById('loading-msg').innerText = "Model Gagal!"; }
        }

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const video = document.getElementById('webcam');
            document.getElementById('preview').style.display = 'none';
            video.style.display = 'block';
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: useFrontCamera?"user":"environment" }});
                video.srcObject = currentStream;
                video.onloadedmetadata = () => video.play();
            } catch (e) { alert("Kamera Gagal!"); }
        }

        function switchCamera() { useFrontCamera = !useFrontCamera; if (currentStream) startCamera(); }

        function handleFile(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                    document.getElementById('webcam').style.display = 'none';
                    const pre = document.getElementById('preview');
                    pre.style.display = 'block'; pre.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function predict() {
            const video = document.getElementById('webcam');
            const preview = document.getElementById('preview');
            const status = document.getElementById('status');
            const infoBox = document.getElementById('auto-info');

            if (video.style.display !== 'none') {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                preview.src = canvas.toDataURL('image/png');
                preview.style.display = 'block'; video.style.display = 'none';
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            }

            status.innerText = "Menganalisis...";
            const tensor = tf.browser.fromPixels(preview).resizeNearestNeighbor([224, 224]).toFloat().expandDims();
            const preds = await model.predict(tensor).data();
            const idx = preds.indexOf(Math.max(...preds));
            const result = CLASS_LIST[idx];

            document.getElementById('prediction').innerHTML = `<strong>Hasil:</strong> ${result}`;
            status.innerText = "Selesai";

            // AUTO SYNC INFO
            if (db[result]) {
                const data = db[result];
                document.getElementById('dis-name').innerText = data.name;
                document.getElementById('dis-sci').innerText = data.sci;
                document.getElementById('dis-symp').innerHTML = data.symp;
                document.getElementById('dis-cause').innerHTML = data.cause;
                document.getElementById('dis-sol').innerHTML = data.sol;
                infoBox.style.display = 'block';
                infoBox.scrollIntoView({ behavior: 'smooth' });
            } else {
                infoBox.style.display = 'none';
            }
        }

        loadModel();
    </script>
</body>
</html>
