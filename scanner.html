<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaddyCare AI - Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    
    <style>
        /* Gaya visual halaman utama */
        body { font-family: 'Segoe UI', sans-serif; background: #7c584a; color: white; text-align: center; padding: 20px; }
        
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #fdfaf5; 
            color: #333; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        
        /* Kotak paparan kamera */
        #video-container { 
            width: 100%; aspect-ratio: 1; background: #000; border-radius: 10px; 
            overflow: hidden; margin-bottom: 15px; border: 3px solid #8d7558; position: relative;
        }

        video, img { width: 100%; height: 100%; object-fit: cover; }

        /* Butang Tukar Kamera (Oren) */
        .btn-switch {
            background: #e67e22; 
            color: white;
            border: 2px solid #d35400;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px auto 20px auto;
            display: block;
            width: 85%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Gaya butang kawalan utama */
        .btn { background: #4a3728; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Kotak keputusan analisis */
        .result-box { background: #eee; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 8px solid #8d7558; text-align: left; }
        #loading-msg { color: #8d7558; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn" onclick="window.location.href='index.html'">← KEMBALI KE MENU</button>
        
        <h2>AI Paddy Scanner</h2>
        <p id="loading-msg">Sila tunggu, memuatkan model AI...</p>

        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <img id="preview" style="display:none">
        </div>

        <button type="button" class="btn-switch" onclick="switchCamera()">
            🔄 TUKAR KE SELFIE / BELAKANG
        </button>

        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleFile(event)">

        <button class="btn" onclick="startCamera()">1. AKTIFKAN KAMERA</button>
        <button class="btn" onclick="document.getElementById('file-input').click()">2. AMBIL DARI GALERI</button>
        
        <button class="btn" style="background:#2ecc71" id="predict-btn" disabled onclick="predict()">3. MULA ANALISIS AI</button>
        
        <div class="result-box">
            <div id="status">Status: Sedia</div>
            <div id="prediction"><strong>Hasil:</strong> -</div>
        </div>
    </div>

    <script>
        let model; 
        let currentStream; 
        let useFrontCamera = false; 

        // Senarai kategori penyakit
        const CLASS_LIST = [
            'Bacteria Panicle Blight (Hawar Bulir Bakteria)', 
            'Brown Spot (Bintik Perang)', 
            'Oryza Sativa (Padi Normal)', 
            'Pseudomonas Fuscovaginae (Sambang)', 
            'Rice Blast (Karah)', 
            'Sheath Blight (Hawar Seludang)'
        ];

        // 1. Muatkan Model AI
        async function loadModel() {
            try {
                model = await tf.loadLayersModel('model_tfjs/model.json');
                document.getElementById('loading-msg').innerText = "Model AI Sedia!";
                document.getElementById('predict-btn').disabled = false;
            } catch (err) {
                document.getElementById('loading-msg').innerText = "Ralat: Fail AI tidak dijumpai!";
            }
        }

        // 2. Aktifkan Kamera
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const video = document.getElementById('webcam');
            const preview = document.getElementById('preview');
            
            preview.style.display = 'none';
            video.style.display = 'block';

            const mode = useFrontCamera ? "user" : "environment";

            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode } 
                });
                video.srcObject = currentStream;
            } catch (err) {
                alert("Ralat kamera: Sila benarkan akses kamera.");
            }
        }

        // 3. Tukar Kamera (Selfie/Belakang)
        function switchCamera() {
            useFrontCamera = !useFrontCamera;
            if (currentStream) {
                startCamera();
            } else {
                alert("Sila aktifkan kamera dahulu.");
            }
        }

        // 4. Pilih fail dari Galeri
        function handleFile(event) {
            const file = event.target.files[0];
            if (file) {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                const reader = new FileReader();
